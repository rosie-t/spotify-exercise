      ## testing the genre mapping##

      - name: stg_track_genre_mapping
        description: "mapping genres to larger genre groups"

        columns:
          - name: track_id
            description: "identifier per track"
            tests:
                - not_null
                - unique
                
          - name: macro_genre
            description: "macro group of genres"
            tests:
                - not_null