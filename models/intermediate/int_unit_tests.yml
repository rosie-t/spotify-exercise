          - {track_id: 't1',  popularity_decile: 1,  danceability_decile: 5, energy_decile: 5, speechiness_decile: 5, acousticness_decile: 5, instrumentalness_decile: 5, liveness_decile: 5, valence_decile: 5}
          - {track_id: 't2',  popularity_decile: 2,  danceability_decile: 5, energy_decile: 5, speechiness_decile: 5, acousticness_decile: 5, instrumentalness_decile: 5, liveness_decile: 5, valence_decile: 5}
