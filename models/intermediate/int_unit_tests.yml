          - {track_id: 't3', popularity: 80,  danceability: 0.1, energy: 0.1, speechiness: 0.1, acousticness: 0.1, instrumentalness: 0.1, liveness: 0.1, valence: 0.1, duration_seconds: 400, tempo: 160}
          - {track_id: 't10', popularity: 10, danceability: 0.1, energy: 0.1, speechiness: 0.1, acousticness: 0.1, instrumentalness: 0.1, liveness: 0.1, valence: 0.1, duration_seconds: 100, tempo: 80}

      - input: ref('int_tracks_scored')
