## checks the z score calculations and the categorisation ##

  - name: unit_int_tracks_scored__popularity_z_two_rows
    model: int_tracks_scored
    given:
      - input: ref('stg_tracks_deduped')
        rows:
          - {track_id: 'a', popularity: 0, danceability: 0.1, energy: 0.1, speechiness: 0.1, acousticness: 0.1, instrumentalness: 0.1, liveness: 0.1, valence: 0.1}
          - {track_id: 'b', popularity: 2, danceability: 0.1, energy: 0.1, speechiness: 0.1, acousticness: 0.1, instrumentalness: 0.1, liveness: 0.1, valence: 0.1}
    expect:
      rows:
        - {track_id: 'a', popularity_z: -1.0}
        - {track_id: 'b', popularity_z: 1.0}

## checks the buckets ## 

