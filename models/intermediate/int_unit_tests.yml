    given:
      - input: ref('stg_tracks_deduped')
        rows:
          - {track_id: 't1', popularity: 100, danceability: 0.1, energy: 0.1, speechiness: 0.1, acousticness: 0.1, instrumentalness: 0.1, liveness: 0.1, valence: 0.1, duration_seconds: 100, tempo: 80}
