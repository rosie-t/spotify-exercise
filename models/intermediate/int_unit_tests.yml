        - {track_id: 't3',  popularity_bucket: 'Middle 50%', is_top_10_percent: 0, duration_bucket: 'Very Long', tempo_bucket: 'Very Fast'}
        - {track_id: 't10', popularity_bucket: 'Bottom 30%', is_top_10_percent: 0, duration_bucket: 'Short',     tempo_bucket: 'Slow'}

## testing the artists model ##

  # 1) splitting + trimming: " Paul A ;Pig&Dan " -> two rows with trimmed names and correct positions
  - name: unit_int_tracks_artists__split_and_trim
    model: int_tracks_artists
    given:
      - input: ref('stg_tracks_deduped')
        rows:
          - { track_id: 't1', artists_name: ' Paul Kalkbrenner ; Pig&Dan ' }
    expect:
      rows:
        - { track_id: 't1', artist_name: 'Paul Kalkbrenner', artist_position: 0 }
        - { track_id: 't1', artist_name: 'Pig&Dan',           artist_position: 1 }

  # 2) dedupe duplicates: "A;A;B" -> keep first A (position 0) and B (position 2)
  - name: unit_int_tracks_artists__dedupe_duplicate_names_keep_first
    model: int_tracks_artists
    given:
      - input: ref('stg_tracks_deduped')
        rows:
          - { track_id: 't2', artists_name: 'Artist A;Artist A;Artist B' }
    expect:
      rows:
        - { track_id: 't2', artist_name: 'Artist A', artist_position: 0 }
        - { track_id: 't2', artist_name: 'Artist B', artist_position: 2 }

  # 3) empty/null handling: blank string and a real artist -> only the real artist appears
  - name: unit_int_tracks_artists__empty_and_null_handling
    model: int_tracks_artists
    given:
      - input: ref('stg_tracks_deduped')
        rows:
          - { track_id: 't3', artists_name: '' }                      # blank string -> no output row
          - { track_id: 't4', artists_name: 'Solo Artist' }           # should produce one row
    expect:
      rows:
        - { track_id: 't4', artist_name: 'Solo Artist', artist_position: 0 }